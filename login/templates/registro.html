<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de nuevo usuario</title>
    
    <link rel="stylesheet" href="custom.css">
</head>
<body class="login-page"> <div class="login-box" style="width: 600px; margin: auto;"> <div class="card">
        <div class="card-body">
            <h1>Registro de nuevo usuario</h1>
            <p class="subtitle">Crea una nueva cuenta de usuario en el sistema.</p>

            <form>
                <div class="form-group">
                    <label>Cédula</label>
                    <input type="text" placeholder="digita el número de cédula">
                </div>

                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" placeholder="digita el nombre">
                </div>

                <div class="form-group">
                    <label>Apellidos</label>
                    <input type="text" placeholder="digita los apellidos">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="digita el correo electrónico">
                </div>

                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" placeholder="digita el número de teléfono">
                </div>

                <div class="form-group">
                    <label>Fecha de nacimiento</label>
                    <input type="text" placeholder="digita la fecha de nacimiento">
                </div>

                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" class="highlight" placeholder="digita el usuario">
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="digita la contraseña">
                </div>

                <div class="form-group">
                    <label>Confirmar contraseña</label>
                    <input type="password" placeholder="confirma la contraseña">
                </div>

                <div class="terms-group">
                    <input type="checkbox" checked>
                    Acepto los <a href="#">términos y condiciones</a> del sitio.
                </div>

                <div class="btn-container">
                    <button type="submit" class="btn-submit">Registrar</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
