{% load static %}
<!doctype html>
<html lang="es">
<head>
    <title>Correo Enviado | Sara Soluciones</title>
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'fontawesome-free-7.0.1-web/css/all.min.css' %}">

     <link rel="stylesheet" href="{% static 'css/login_style.css' %}">
</head>
<body class="hold-transition login-page"> 
    <div id="slideshow-background"></div>
    
    <div class="login-box">
        <div class="card shadow-lg border-0">
            <div class="card-body text-center p-5">
                <i class="fas fa-envelope-open-text text-success" style="font-size: 4rem; margin-bottom: 20px;"></i>
                <h3 class="font-weight-bold">¡Revisa tu bandeja!</h3>
                <p class="text-muted mt-3">
                    Hemos enviado las instrucciones para restablecer tu contraseña.
                </p>
                <div class="alert alert-light border small text-left mt-4">
                    <i class="fas fa-info-circle text-info mr-1"></i> Si no ves el correo en unos minutos, revisa tu carpeta de <b>Spam</b> o Correo no deseado.
                </div>

                <a href="{% url 'login:login' %}" class="btn btn-outline-primary btn-block mt-4 font-weight-bold">
                    Volver al inicio
                </a>
            </div>
        </div>
    </div>
</body>
</html>
