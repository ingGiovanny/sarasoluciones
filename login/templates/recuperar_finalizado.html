{% load static %}
<!doctype html>
<html lang="es">
<head>
    <title>¡Éxito! | Sara Soluciones</title>
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'fontawesome-free-7.0.1-web/css/all.min.css' %}">
   <link rel="stylesheet" href="{% static 'css/login_style.css' %}">
    <style>
        /* Checkmark animation */
        @keyframes checkPop {
            0%   { transform: scale(0); opacity: 0; }
            70%  { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .status-icon-success { animation: checkPop 0.5s 0.3s cubic-bezier(0.4,0,0.2,1) both; }
    </style>
</head>
<body class="hold-transition login-page"> 
    <div id="slideshow-background"></div>
    
    <div class="login-box">
        <div class="card shadow-lg border-0">
            <div class="card-body text-center p-5">
                <i class="fas fa-check-circle text-primary" style="font-size: 4rem; margin-bottom: 20px;"></i>
                <h3 class="font-weight-bold">¡Contraseña Actualizada!</h3>
                <p class="text-muted mt-3">
                    Tu cuenta ahora está segura. Ya puedes acceder con tus nuevas credenciales.
                </p>

                <a href="{% url 'login:login' %}" class="btn btn-primary btn-block mt-4 font-weight-bold btn-lg">
                    <i class="fas fa-sign-in-alt mr-2"></i> Iniciar Sesión
                </a>
            </div>
        </div>
    </div>
</body>
</html>
