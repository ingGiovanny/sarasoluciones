{% load static %} 
<!doctype html>
<html lang="en"> 

  <head>
    <title>Soluciones Sara</title>
   <link rel="icon" type="image/png" href="{% static 'img/logosara.png' %} "

   class="brand-image opacity-75 shadow"
    style="width:50px; height:300px; border-radius:100%; object-fit:cover; background:white;">

    <!-- Configuración para dispositivos móviles y temas de color -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#007bff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />

    <!-- Metadatos para SEO y accesibilidad -->
    <meta name="title" content="AdminLTE 4 | Sidebar Mini" />
    <meta name="author" content="ColorlibHQ" />
    <meta name="description" content="AdminLTE es un dashboard gratuito basado en Bootstrap 5 con 30 páginas de ejemplo usando JavaScript puro." />
    <meta name="keywords" content="bootstrap 5, dashboard, datatable, accesible, WCAG" />
    <meta name="supported-color-schemes" content="light dark" />

    <!-- Pre-carga y carga de estilos CSS -->
    <link rel="preload" href="{% static 'AdminLTE/dist/css/adminlte.css' %}" as="style" />
    <link rel="stylesheet" href="{% static 'AdminLTE/dist/css/adminlte.css' %}" />
    <link rel="stylesheet" href="{% static 'AdminLTE/dist/css/fonts.css' %}" />
    <link rel="stylesheet" href="{% static 'AdminLTE/dist/css/overlayscrollbar.css' %}" />
    <link rel="stylesheet" href="{% static 'AdminLTE/dist/css/bootstrap.css' %}" />

    <!-- Estilos para DataTables responsivos -->
    <link rel="stylesheet" href="{% static 'lib/datatables-1.10.20/css/jquery.dataTables.min.css' %}">
    <link rel="stylesheet" href="{% static 'lib/datatables-1.10.20/plugins/responsive-2.2.3/css/responsive.bootstrap4.min.css' %}">

    <!-- Scripts JS necesarios para funcionalidad -->
    <script src="{% static 'lib/datatables-1.10.20/jquery-3.7.1.min.js' %}"></script>
    <script src="{% static 'AdminLTE/dist/js/overlayscrollbars.js' %}"></script>
    <script src="{% static 'AdminLTE/dist/js/popper.js' %}"></script>
    <script src="{% static 'AdminLTE/dist/js/bootstrap.js' %}"></script>
    <script src="{% static 'AdminLTE/dist/js/adminlte.js' %}"></script>

    <!-- Scripts para DataTables responsivos -->
    <script src="{% static 'lib/datatables-1.10.20/datatables.min.js' %}"></script>
    <script src="{% static 'lib/datatables-1.10.20/plugins/responsive-2.2.3/js/dataTables.responsive.min.js' %}"></script>
    <script src="{% static 'lib/datatables-1.10.20/plugins/responsive-2.2.3/js/responsive.bootstrap4.min.js' %}"></script>
     <!--rutas para que el mensaje al estar encima de un boton funcione-->
     <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  </head>
<style>
body {
  background-color: #f8f9fa;
  color: #212529;
  transition: background-color 0.3s, color 0.3s;
}

/* 🌙 Modo oscuro */
body.dark-mode,
body.dark-mode .app-wrapper,
body.dark-mode .content-wrapper,
body.dark-mode .main-content {
  background-color: #1e1e2f !important;
  color: #f1f1f1 !important;
  transition: background-color 0.3s, color 0.3s;
}

/* Navbar, header */
body.dark-mode .navbar,
body.dark-mode .main-header {
  background-color: #2d2d39 !important;
  color: #f1f1f1 !important;
}

/* Sidebar */
body.dark-mode .sidebar,
body.dark-mode .main-sidebar {
  background-color: #242434 !important;
  color: #f1f1f1 !important;
}

/* Cards, tablas, formularios, contenido */
body.dark-mode .card,
body.dark-mode table,
body.dark-mode .form-control,
body.dark-mode .content {
  background-color: #2b2b3b !important;
  color: #f1f1f1 !important;
  border-color: #444 !important;
}

/* Celdas de encabezado de tabla */
body.dark-mode .table thead {
  background-color: #343a40 !important;
  color: #ffffff !important;
}

/* Estilos para el sidebar en modo claro */
.main-sidebar {
  background-color: #ffffff;
  color: #212529;
  transition: background-color 0.3s, color 0.3s;
}

.main-sidebar .nav-link {
  color: #212529;
}

/* Estilos para el sidebar en modo oscuro */
body.dark-mode .main-sidebar {
  background-color: #242434 !important;
  color: #f1f1f1 !important;
}

body.dark-mode .main-sidebar .nav-link {
  color: #f1f1f1 !important;
}

body.dark-mode .main-sidebar .nav-link:hover {
  background-color: #1e1e2f !important;
}

body.dark-mode .main-sidebar .brand-link {
  background-color: #242434 !important;
  color: #f1f1f1 !important;
  border-bottom: 1px solid #444;
}

/* Ajustes para el logo y textos del sidebar */
body.dark-mode .brand-text,
body.dark-mode .nav-sidebar .nav-link p {
  color: #f1f1f1 !important;
}

/* Ajuste para elementos activos del sidebar */
body.dark-mode .nav-sidebar .nav-item.active > .nav-link,
body.dark-mode .nav-sidebar .nav-link.active {
  background-color: #007bff !important;
  color: #ffffff !important;
}

/* Estilos específicos para el sidebar */
.app-sidebar {
    background-color: #ffffff;
    color: #212529;
    transition: all 0.3s ease;
}

/* Modo oscuro para el sidebar */
body.dark-mode .app-sidebar {
    background-color: #242434 !important;
    color: #ffffff !important;
}

/* Enlaces del sidebar en modo oscuro */
body.dark-mode .sidebar-menu .nav-link {
    color: #ffffff !important;
}

body.dark-mode .sidebar-menu .nav-link:hover {
    background-color: #1e1e2f !important;
}

/* Marca/logo del sidebar en modo oscuro */
body.dark-mode .sidebar-brand,
body.dark-mode .brand-link {
    background-color: #242434 !important;
    color: #ffffff !important;
}

/* Iconos del sidebar en modo oscuro */
body.dark-mode .nav-icon {
    color: #ffffff !important;
}
</style>
  <!-- Inclusión del encabezado desde otra plantilla -->
  {% include 'header.html' %}

  <!-- Bloque editable para el contenido principal -->
  {% block body %}{% endblock %}

  <!-- Inclusión del pie de página desde otra plantilla -->
  {% include 'footer.html' %}

</html>
