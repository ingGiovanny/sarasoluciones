{% extends 'layout.html' %}
{% load static %}

{% block body %}
<body class="layout-fixed sidebar-expand-lg sidebar-mini sidebar-collapse bg-body-tertiary">
    <div class="app-wrapper">
        
        {% include 'sidebar.html' %}

        {% block content %}{% endblock %}
    </div>

    {% include "boton_widgetAccesibilidad.html" %}

<script>
    const toggle = document.getElementById('mode-toggle');
    if (toggle) {
        toggle.addEventListener('change', () => {
            document.body.classList.toggle('dark-mode');
            
            const text = document.getElementById('mode-text');
            const icon = document.getElementById('mode-icon');
            
            if (toggle.checked) {
                if(text) text.textContent = "oscuro";
                if(icon) icon.classList.replace('bi-brightness-high', 'bi-moon-stars');
            } else {
                if(text) text.textContent = "claro";
                if(icon) icon.classList.replace('bi-moon-stars', 'bi-brightness-high');
            }
        });
    }
</script>
<script>
  function moverWidgetDerecha() {
    const widgets = document.querySelectorAll('.asw-widget, .asw-menu-btn');
    widgets.forEach(el => {
      el.style.setProperty('left', 'auto', 'important');
      el.style.setProperty('right', '20px', 'important');
    });
  }

  // Lo ejecutamos al cargar
  window.addEventListener('load', moverWidgetDerecha);

  // Lo ejecutamos cada vez que se haga clic (por si el widget se resetea)
  document.addEventListener('click', () => {
    setTimeout(moverWidgetDerecha, 100);
  });

  // Usamos un observador por si el widget se crea dinámicamente
  const observer = new MutationObserver(moverWidgetDerecha);
  observer.observe(document.body, { childList: true, subtree: true });
</script>
</body>
{% endblock %}
