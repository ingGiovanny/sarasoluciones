<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        @page { size: letter; margin: 1cm; }
        body { font-family: sans-serif; color: #333; }
        .header { text-align: center; border-bottom: 2px solid #ce2029; margin-bottom: 20px; }
        h1 { color: #ce2029; text-transform: uppercase; margin-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; }
        th { background-color: #ce2029; color: white; padding: 8px; }
        td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Soluciones Sara</h1>
        <p>Reporte de {{ titulo }} - Fecha: {% now "d/m/Y" %}</p>
    </div>
    <table>
        <thead>
            <tr>
                {% for encabezado in encabezados %}
                    <th>{{ encabezado }}</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for fila in datos %}
                <tr>
                    {% for celda in fila %}
                        <td>{{ celda }}</td>
                    {% endfor %}
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
